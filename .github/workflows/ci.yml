name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend tests (Django + PostGIS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:14-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geopasto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DJANGO_SECRET_KEY: test_secret
      DATABASE_ENGINE: django.contrib.gis.db.backends.postgis
      DATABASE_NAME: geopasto_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system packages for GeoDjango
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev proj-bin libproj-dev libgeos-dev build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements-ci.txt ]; then pip install -r backend/requirements-ci.txt; else pip install -r backend/requirements.txt; fi

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 && break
            sleep 1
          done

      - name: Run migrations
        run: |
          python backend/manage.py migrate --noinput

      - name: Run pytest
        run: |
          pytest -c backend/pytest.ini backend -q
